agent:
  name: "ReflexionAgent-Prod"
  max_iterations: 10
  stopping_score: 0.90
  min_improvement_delta: 0.02
  timeout_seconds: 300

llm:
  default_provider: "anthropic"
  actor:
    provider: "anthropic"
    model: "claude-3-opus-20240229"
    temperature: 0.7
    max_tokens: 8192
  evaluator:
    provider: "openai"
    model: "gpt-4o-2024-05-13"
    temperature: 0.1
    max_tokens: 2048
  reflector:
    provider: "anthropic"
    model: "claude-3-sonnet-20240229"
    temperature: 0.2
    max_tokens: 4096

memory:
  episodic:
    backend: "chroma"
    persist_directory: "/data/reflexion/episodic"  # Absolute path in prod
    collection_name: "episodes_prod"
    similarity_top_k: 10
  reflection:
    backend: "chroma"
    persist_directory: "/data/reflexion/reflections"
    collection_name: "reflections_prod"
    similarity_top_k: 5
  short_term:
    max_tokens: 16384

logging:
  level: "INFO"
  format: "json"  # JSON for production logging
  enable_structlog: true

observability:
  enable_tracing: true
  trace_exporter: "otlp"  # Send to Jaeger/Honeycomb
  otlp_endpoint: "http://jaeger-collector:4317"
  metrics_enabled: true

tools:
  enabled:
    - "calculator"
    - "web_search"
    - "python_repl"
    - "file_operations"