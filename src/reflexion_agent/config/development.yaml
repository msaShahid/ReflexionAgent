agent:
  name: "ReflexionAgent-Dev"
  max_iterations: 3           # Lower for faster iteration
  stopping_score: 0.80
  min_improvement_delta: 0.1
  timeout_seconds: 60

llm:
  default_provider: "anthropic"
  actor:
    provider: "anthropic"
    model: "claude-3-haiku-20240307"  # Faster, cheaper for dev
    temperature: 0.7
    max_tokens: 2048
  evaluator:
    provider: "openai"
    model: "gpt-3.5-turbo"  # Cheaper for dev
    temperature: 0.2
    max_tokens: 512
  reflector:
    provider: "anthropic"
    model: "claude-3-haiku-20240307"
    temperature: 0.3
    max_tokens: 1024

memory:
  episodic:
    backend: "in_memory"  # No persistence for dev
    collection_name: "episodes_dev"
    similarity_top_k: 3
  reflection:
    backend: "in_memory"
    collection_name: "reflections_dev"
    similarity_top_k: 2
  short_term:
    max_tokens: 4096

logging:
  level: "DEBUG"
  format: "pretty"
  enable_structlog: true

observability:
  enable_tracing: false
  trace_exporter: "console"
  metrics_enabled: false

tools:
  enabled:
    - "calculator"