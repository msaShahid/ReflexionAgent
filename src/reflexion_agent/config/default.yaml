# src/reflexion_agent/config/default.yaml
agent:
  name: "ReflexionAgent"
  max_iterations: 5          # Hard cap on loop iterations
  stopping_score: 0.85       # Score threshold to stop early (0.0 to 1.0)
  min_improvement_delta: 0.05 # Stop if score gain is smaller than this
  timeout_seconds: 120       # Wall-clock timeout for entire run

llm:
  default_provider: "anthropic"
  actor:                      # Most capable model — does the actual work
    provider: "anthropic"
    model: "claude-3-opus-20240229"  # Updated model name
    temperature: 0.7
    max_tokens: 4096
  evaluator:                  # Cheaper model — just scores the answer
    provider: "openai"
    model: "gpt-4o-2024-05-13"  # Updated model name
    temperature: 0.2
    max_tokens: 1024
  reflector:                  # Mid-tier model — generates lessons
    provider: "anthropic"
    model: "claude-3-sonnet-20240229"  # Updated model name
    temperature: 0.3
    max_tokens: 2048

memory:
  episodic:
    backend: "chroma"         # chroma | in_memory | qdrant
    persist_directory: "./.memory/episodic"
    collection_name: "episodes"
    similarity_top_k: 5
  reflection:
    backend: "chroma"
    persist_directory: "./.memory/reflections"
    collection_name: "reflections"
    similarity_top_k: 3
  short_term:
    max_tokens: 8192          # Token budget for in-context memory

logging:
  level: "INFO"               # DEBUG | INFO | WARNING | ERROR
  format: "pretty"            # json (production) | pretty (development)
  enable_structlog: true

observability:
  enable_tracing: true
  trace_exporter: "console"   # console | otlp | none
  otlp_endpoint: "http://localhost:4317"  # Only used if trace_exporter is "otlp"
  metrics_enabled: true

tools:
  enabled:
    - "calculator"
    - "web_search"