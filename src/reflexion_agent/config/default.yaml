agent:
  name: "ReflexionAgent"
  max_iterations: 5
  stopping_score: 0.85
  min_improvement_delta: 0.05
  timeout_seconds: 120

llm:
  default_provider: "anthropic"
  actor:
    provider: "anthropic"
    model: "claude-3-sonnet-20240229"
    temperature: 0.7
    max_tokens: 4096
  evaluator:
    provider: "openai"
    model: "gpt-4o"
    temperature: 0.2
    max_tokens: 1024
  reflector:
    provider: "anthropic"
    model: "claude-3-haiku-20240307"
    temperature: 0.3
    max_tokens: 2048

memory:
  episodic:
    backend: "in_memory"  # Use in_memory for testing
    collection_name: "episodes"
    similarity_top_k: 5
  reflection:
    backend: "in_memory"
    collection_name: "reflections"
    similarity_top_k: 3
  short_term:
    max_tokens: 8192

logging:
  level: "INFO"
  format: "pretty"
  enable_structlog: true

observability:
  enable_tracing: false
  trace_exporter: "console"
  metrics_enabled: false

tools:
  enabled:
    - "calculator"